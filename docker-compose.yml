services:
  db:
    image: postgres:16-alpine
    container_name: nazartepa_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nazartepa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nazartepa_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-nazartepa103}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nazartepa} -d ${POSTGRES_DB:-nazartepa103}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nazartepa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nazartepa_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Docker tarmog'i ichida host nomlari: db, redis
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-nazartepa}:${POSTGRES_PASSWORD:-nazartepa_dev_password}@db:5432/${POSTGRES_DB:-nazartepa103}
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata:
  redisdata:
